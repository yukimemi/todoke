<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans JP', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe9f0"/>
      <stop offset="60%" stop-color="#ffc3d4"/>
      <stop offset="100%" stop-color="#ff9bb4"/>
    </linearGradient>
    <linearGradient id="env" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff0f5"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e85c85"/>
    </marker>
  </defs>

  <!-- Plate -->
  <rect width="640" height="220" fill="url(#bg)" rx="18"/>

  <!-- Decorative falling petals scattered at the corners (inline paths,
       no <use> so ImageMagick / librsvg renders them reliably). -->
  <g fill="#ffffff" stroke="#e85c85" stroke-width="2" stroke-linejoin="round">
    <path transform="translate(28 28) rotate(15)"
          d="M 0 0 C -10 -10 -15 -24 -4 -29 L -1 -23 L 0 -29 L 1 -23 L 4 -29 C 15 -24 10 -10 0 0 Z"/>
    <path transform="translate(118 180) rotate(-30)"
          d="M 0 0 C -9 -9 -13 -21 -3 -25 L -1 -20 L 0 -25 L 1 -20 L 3 -25 C 13 -21 9 -9 0 0 Z"/>
    <path transform="translate(612 30) rotate(-25)"
          d="M 0 0 C -10 -10 -15 -24 -4 -29 L -1 -23 L 0 -29 L 1 -23 L 4 -29 C 15 -24 10 -10 0 0 Z"/>
    <path transform="translate(620 176) rotate(45)"
          d="M 0 0 C -8 -8 -12 -19 -3 -22 L -1 -18 L 0 -22 L 1 -18 L 3 -22 C 12 -19 8 -8 0 0 Z"/>
    <path transform="translate(240 22) rotate(10)"
          d="M 0 0 C -9 -9 -13 -21 -3 -25 L -1 -20 L 0 -25 L 1 -20 L 3 -25 C 13 -21 9 -9 0 0 Z"/>
    <path transform="translate(450 200) rotate(-20)"
          d="M 0 0 C -8 -8 -12 -19 -3 -22 L -1 -18 L 0 -22 L 1 -18 L 3 -22 C 12 -19 8 -8 0 0 Z"/>
  </g>

  <!-- Input: envelope -->
  <g transform="translate(50 85)">
    <rect width="100" height="56" rx="8" fill="url(#env)" stroke="#e85c85" stroke-width="2.5"/>
    <path d="M 4 4 L 50 36 L 96 4" stroke="#e85c85" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    <text x="50" y="78" text-anchor="middle" fill="#b33a5c" font-size="12" letter-spacing="1">input</text>
  </g>

  <!-- Arrow: input → core -->
  <path d="M 155 113 L 235 113" stroke="#e85c85" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Core: wordmark "todoke" with a small sakura accent beside it.
       Inline 5-petal sakura — no <symbol>/<use> so no rendering glitches.
       Scaled down so it's decorative, not a billboard. -->
  <g transform="translate(322 98) scale(0.42)">
    <g fill="#ffffff" stroke="#e85c85" stroke-width="6" stroke-linejoin="round">
      <path d="M 0 0 C -22 -22 -38 -52 -14 -72 L -4 -62 L 0 -72 L 4 -62 L 14 -72 C 38 -52 22 -22 0 0 Z"/>
      <path transform="rotate(72)"
            d="M 0 0 C -22 -22 -38 -52 -14 -72 L -4 -62 L 0 -72 L 4 -62 L 14 -72 C 38 -52 22 -22 0 0 Z"/>
      <path transform="rotate(144)"
            d="M 0 0 C -22 -22 -38 -52 -14 -72 L -4 -62 L 0 -72 L 4 -62 L 14 -72 C 38 -52 22 -22 0 0 Z"/>
      <path transform="rotate(216)"
            d="M 0 0 C -22 -22 -38 -52 -14 -72 L -4 -62 L 0 -72 L 4 -62 L 14 -72 C 38 -52 22 -22 0 0 Z"/>
      <path transform="rotate(288)"
            d="M 0 0 C -22 -22 -38 -52 -14 -72 L -4 -62 L 0 -72 L 4 -62 L 14 -72 C 38 -52 22 -22 0 0 Z"/>
    </g>
    <circle r="11" fill="#ffd23f" stroke="#e85c85" stroke-width="4"/>
  </g>

  <!-- Wordmark -->
  <text x="322" y="145" text-anchor="middle" fill="#ffffff" stroke="#b33a5c" stroke-width="0.7"
        font-size="40" font-weight="800" letter-spacing="3">todoke</text>

  <!-- Arrows fanning out to generic destinations -->
  <g stroke="#e85c85" stroke-width="2.5" fill="none">
    <path d="M 408 92  C 450 72 490 62 525 58" marker-end="url(#arr)"/>
    <path d="M 408 113 L 525 113"               marker-end="url(#arr)"/>
    <path d="M 408 134 C 450 154 490 164 525 168" marker-end="url(#arr)"/>
  </g>
  <g fill="#b33a5c" font-size="13" letter-spacing="1">
    <text x="535" y="62">editor</text>
    <text x="535" y="117">browser</text>
    <text x="535" y="172">script</text>
  </g>

  <!-- Japanese subline -->
  <text x="322" y="198" text-anchor="middle" fill="#b33a5c" font-size="11" letter-spacing="6"
        font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif">届け — files · urls · anything</text>
</svg>
