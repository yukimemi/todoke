<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans JP', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe9f0"/>
      <stop offset="60%" stop-color="#ffc3d4"/>
      <stop offset="100%" stop-color="#ff9bb4"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff0f5"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.75"/>
    </linearGradient>
    <!-- One petal reused everywhere -->
    <symbol id="sakura-petal" viewBox="-20 -72 40 72">
      <path d="M 0 0 C -22 -22 -38 -52 -14 -72 L -4 -62 L 0 -72 L 4 -62 L 14 -72 C 38 -52 22 -22 0 0 Z"
            fill="url(#petal)" stroke="#e85c85" stroke-width="2.5" stroke-linejoin="round"/>
    </symbol>
    <!-- Full blossom -->
    <symbol id="sakura" viewBox="-80 -80 160 160">
      <g>
        <use href="#sakura-petal" transform="rotate(0)"/>
        <use href="#sakura-petal" transform="rotate(72)"/>
        <use href="#sakura-petal" transform="rotate(144)"/>
        <use href="#sakura-petal" transform="rotate(216)"/>
        <use href="#sakura-petal" transform="rotate(288)"/>
        <circle r="10" fill="#ffd23f" stroke="#e85c85" stroke-width="1.5"/>
      </g>
    </symbol>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e85c85"/>
    </marker>
  </defs>

  <!-- Plate -->
  <rect width="640" height="220" fill="url(#bg)" rx="18"/>

  <!-- Scattered falling petals (decorative) -->
  <g opacity="0.75">
    <use href="#sakura-petal" x="48" y="32" width="22" height="40" transform="rotate(20 59 52)"/>
    <use href="#sakura-petal" x="92" y="165" width="16" height="28" transform="rotate(-15 100 179)"/>
    <use href="#sakura-petal" x="560" y="36" width="20" height="36" transform="rotate(-30 570 54)"/>
    <use href="#sakura-petal" x="600" y="160" width="14" height="24" transform="rotate(40 607 172)"/>
    <use href="#sakura-petal" x="370" y="22" width="18" height="32" transform="rotate(10 379 38)"/>
  </g>

  <!-- Input glyph: a simple envelope -->
  <g transform="translate(50 88)">
    <rect width="92" height="50" rx="6" fill="url(#core)" stroke="#e85c85" stroke-width="2"/>
    <path d="M 4 4 L 46 32 L 88 4" stroke="#e85c85" stroke-width="2" fill="none"/>
    <text x="46" y="75" text-anchor="middle" fill="#b33a5c" font-size="12" letter-spacing="1">input</text>
  </g>
  <!-- Arrow: input → core -->
  <path d="M 150 110 Q 200 110 240 110" stroke="#e85c85" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Core: sakura blossom above the wordmark -->
  <use href="#sakura" x="262" y="50" width="116" height="116"/>

  <!-- Arrows fanning out to generic destinations -->
  <g stroke="#e85c85" stroke-width="2.5" fill="none">
    <path d="M 400 92  C 445 72 490 62 530 58" marker-end="url(#arr)"/>
    <path d="M 400 110 L 530 110"               marker-end="url(#arr)"/>
    <path d="M 400 128 C 445 148 490 158 530 162" marker-end="url(#arr)"/>
  </g>
  <g fill="#b33a5c" font-size="12" letter-spacing="1">
    <text x="540" y="62">editor</text>
    <text x="540" y="114">browser</text>
    <text x="540" y="166">script</text>
  </g>

  <!-- Wordmark -->
  <text x="320" y="190" text-anchor="middle" fill="#ffffff" stroke="#b33a5c" stroke-width="0.6"
        font-size="34" font-weight="800" letter-spacing="3">todoke</text>
  <!-- Japanese subline + generalized tagline -->
  <text x="320" y="210" text-anchor="middle" fill="#b33a5c" font-size="11" letter-spacing="6"
        font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif">届け — files · urls · anything</text>
</svg>
