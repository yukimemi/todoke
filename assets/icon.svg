<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe4ec"/>
      <stop offset="60%" stop-color="#ffb9cd"/>
      <stop offset="100%" stop-color="#ff8aa8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="envelope" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff0f5"/>
    </linearGradient>
  </defs>

  <!-- Rounded plate -->
  <rect width="256" height="256" rx="44" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="96" fill="url(#glow)"/>

  <!-- Envelope — the "届け" metaphor: a letter to deliver.
       Centered, sized ~60% of the plate so it reads at 16px. -->
  <g transform="translate(128 128)">
    <!-- body -->
    <rect x="-74" y="-46" width="148" height="92" rx="10"
          fill="url(#envelope)" stroke="#e85c85" stroke-width="6" stroke-linejoin="round"/>
    <!-- fold flap -->
    <path d="M -71 -43 L 0 14 L 71 -43" fill="none" stroke="#e85c85" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- Sakura petals scattered around (deco + reinforces the sakura theme).
       Simple tear-drop shape: pointed top, rounded bottom. -->
  <g fill="#ffffff" stroke="#e85c85" stroke-width="3" stroke-linejoin="round">
    <!-- top-left, 1 petal -->
    <path transform="translate(52 52) rotate(-20)"
          d="M 0 0 C -14 -14 -20 -32 -6 -38 L -2 -30 L 0 -38 L 2 -30 L 6 -38 C 20 -32 14 -14 0 0 Z"/>
    <!-- top-right -->
    <path transform="translate(212 64) rotate(30)"
          d="M 0 0 C -12 -12 -18 -28 -5 -34 L -2 -27 L 0 -34 L 2 -27 L 5 -34 C 18 -28 12 -12 0 0 Z"/>
    <!-- bottom-right -->
    <path transform="translate(210 210) rotate(170)"
          d="M 0 0 C -12 -12 -18 -28 -5 -34 L -2 -27 L 0 -34 L 2 -27 L 5 -34 C 18 -28 12 -12 0 0 Z"/>
    <!-- bottom-left -->
    <path transform="translate(48 206) rotate(-150)"
          d="M 0 0 C -10 -10 -15 -24 -4 -29 L -1 -23 L 0 -29 L 1 -23 L 4 -29 C 15 -24 10 -10 0 0 Z"/>
  </g>

</svg>
