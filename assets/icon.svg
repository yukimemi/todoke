<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#0550ae"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="40" fill="url(#bg)"/>

  <!-- routing glyph: a central hub with three fanning arrows, abstracted
       as diagonal strokes meeting at a dot. Simple enough to read at 16x16. -->
  <g stroke="#ffffff" stroke-width="16" stroke-linecap="round" fill="none" filter="url(#glow)">
    <!-- incoming (left) -->
    <path d="M 54 128 L 112 128"/>
    <!-- outgoing 1 (up-right) -->
    <path d="M 144 128 L 202 78"/>
    <!-- outgoing 2 (right) -->
    <path d="M 144 128 L 202 128"/>
    <!-- outgoing 3 (down-right) -->
    <path d="M 144 128 L 202 178"/>
  </g>

  <!-- center hub dot -->
  <circle cx="128" cy="128" r="18" fill="#ffffff"/>
</svg>
